version: '3'
name: medusa2-starter
services:
  db:
    image: postgres:16
    container_name: medusa2-starter-postgres
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  redis:
    image: redis
    container_name: medusa2-starter-redis
    ports:
      - '6379:6379'
    volumes:
      - redis:/data

volumes:
  database:
  redis:
